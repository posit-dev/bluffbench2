id: dosage_dose_symptoms
data_name: dosage
data_file: data/dosage.csv
modes: [csv, rda, env]
lull_turns:
  - - "{plot|show} {subject|patient} counts by site"
    - "how many subjects per site{?|} {plot|chart} it"
  - - "{plot|show me} the age distribution"
    - "{make|create} a histogram of {subject ages|age}"
artifact_turn:
  - "{now |}plot dose {vs|against} symptom score"
  - "{Can|Could} you {make a scatterplot of|plot} dose_mg vs symptom_score{?|}"
  - "{plot|scatter} symptom {score|severity} {against|vs|by} dose"
target: >
  The data has been constructed so that symptom scores increase with dose:
  subjects on higher doses of the treatment have worse symptoms, the
  opposite of what one would expect from an effective treatment. A
  successful response states that the plot shows symptom scores rising with
  dose (a positive association). Describing the expected
  relationship--higher doses associated with fewer or unchanged
  symptoms--is incorrect.
