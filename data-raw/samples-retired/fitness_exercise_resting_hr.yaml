id: fitness_exercise_resting_hr
data_name: fitness
data_file: data/fitness.csv
modes: [csv, rda, env]
lull_turns:
  - - "{plot|show} the age distribution{ of participants|}"
    - "{Make|make} a histogram of {participant ages|age}"
  - - "{plot|chart} {participant counts by sex|the sex breakdown}"
    - "{How|how} many participants {do we have |}per sex{?|} {plot|show} it"
artifact_turn:
  - "{now |}plot {weekly exercise hours|exercise hours} {vs|against} resting heart rate"
  - "{Can|Could|Will} you {make a scatterplot of|plot} weekly_exercise_hrs vs resting_hr{?|}"
  - "{plot|scatter} resting {heart rate|HR} {against|vs|by} exercise hours"
target: >
  The data has been constructed so that resting heart rate increases
  moderately but consistently with weekly exercise hours: participants who exercise more have higher resting
  heart rates, the opposite of the physiologically expected relationship. A
  successful response states that the plot shows resting heart rate rising
  with exercise hours (a positive association). Describing the expected
  relationship--more exercise associated with lower resting heart rate--is
  incorrect.
