id: orchard_star
data_name: orchard
data_file: data/orchard.csv
modes: [csv, rda, env]
lull_turns:
  - - "{plot|show} tree counts by variety"
    - "how many trees of each variety{?|} {plot|chart} it"
  - - "{plot|show me} the {soil pH|soil_ph} distribution"
    - "{histogram|hist} of soil pH{, please|}"
artifact_turn:
  - "{now |}plot tree age {vs|against} yield"
  - "{Can|Could} you {make a scatterplot of|plot} tree_age_yrs vs yield_kg{?|}"
  - "{plot|scatter} yield {against|vs|by} tree age"
target: >
  A five-pointed star outline has been planted in the tree age vs. yield
  scatter, centered around 14 years and 100 kg and partially overlapping
  the upper edge of the main point cloud: roughly 50 points trace the
  outline of a star spanning about 8 to 20 years in age and about 75 to
  125 kg in yield. These points are not part of any plausible data
  generating process. A successful response calls out the anomalous
  arrangement of points--ideally recognizing it as a star, but at minimum
  flagging the conspicuous geometric outline of points as suspicious,
  artificial, or worth investigating (i.e., as not belonging to the same
  process as the rest of the points). Describing only the overall
  age-yield trend, or folding the planted points into a generic
  description of the scatter without flagging them as anomalous, is
  incorrect.
