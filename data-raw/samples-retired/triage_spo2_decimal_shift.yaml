id: triage_spo2_decimal_shift
data_name: triage
data_file: data/triage.csv
modes: [csv, rda, env]
lull_turns:
  - - "{plot|chart} {encounter|patient} counts by acuity{ level|}"
    - "how many {encounters|patients} per acuity level{?|} {plot|show} it"
  - - "{plot|show me} the age distribution"
    - "{histogram|hist} of {patient ages|age}"
artifact_turn:
  - "{now |}plot age {vs|against} {SpO2|oxygen saturation}"
  - "{Can|Could} you {make a scatterplot of|plot} age vs spo2_pct{?|}"
  - "{plot|scatter} {SpO2|oxygen saturation} {against|vs|by} age"
target: >
  Five walk-in encounters have an oxygen saturation recorded between 9.3
  and 10 percent--a tenfold decimal-point error (e.g. 98 entered as
  9.8)--values incompatible with conscious walk-in patients, forming a
  small stripe of points near 10 at the bottom of the plot. A successful
  response flags these values as impossible/invalid (e.g. a decimal or
  data entry error worth excluding or investigating). Describing only the
  overall age-SpO2 trend, or taking the ~10 percent saturations at face
  value, is incorrect.
