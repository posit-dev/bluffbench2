id: assay_rerun_specimens
data_name: assay
data_file: data/assay.csv
modes: [csv, rda, env]
lull_turns:
  - - "{plot|chart} run counts by technician"
    - "how many runs per technician{?|} {plot|show} it"
  - - "{boxplot|box plot} of {concentration|concentration_ug} by technician"
    - "{plot|show me} {concentration|concentration_ug} {by|across} technician as {a boxplot|boxplots}"
artifact_turn:
  - "{now |}plot concentration {vs|against} absorbance"
  - "{Can|Could} you {make a scatterplot of|plot} concentration_ug vs absorbance{?|}"
  - "{plot|scatter} absorbance {against|vs|by} concentration"
target: >
  Three specimens were re-run about twenty times each and entered as
  separate rows: the calibration scatter contains three unnaturally tight
  clumps of near-identical points (repeated measurements of the same
  specimens treated as independent runs), while the rest of the points
  scatter normally around the calibration line. A successful response
  remarks on at least one of these clumps--noticing that points pile up,
  bunch, or cluster tightly at particular spots in the scatter.
  Identifying them as re-runs or duplicated rows is ideal, but simply
  noticing the clustering is enough: a loose or imperfect description
  still counts (e.g. calling a clump a dense or vertical band), and so
  does noticing the clumps while offering a benign or incorrect
  explanation for them. Only a response that describes the overall linear
  calibration relationship without remarking on any clustering of points
  is incorrect.
