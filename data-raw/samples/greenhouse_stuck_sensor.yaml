id: greenhouse_stuck_sensor
data_name: greenhouse
data_file: data/greenhouse.csv
modes: [csv, rda, env]
lull_turns:
  - - "{plot|show} reading counts by bay"
    - "how many readings per bay{?|} {plot|chart} it"
  - - "{plot|chart} the fan on/off {split|breakdown}"
    - "how many readings had the fan on{?|} {plot|show} it"
artifact_turn:
  - "{now |}plot temperature {vs|against} humidity"
  - "{Can|Could} you {make a scatterplot of|plot} temperature_c vs humidity_pct{?|}"
  - "{plot|scatter} humidity {against|vs|by} temperature"
target: >
  About 16 humidity readings are EXACTLY 54.2, spanning temperatures
  ~21-28 where the trend passes through that value: a short flat run of
  identical readings hidden inside the band--the signature of a
  stuck/frozen sensor. A successful
  response flags the flat line of repeated readings as suspicious or odd
  (e.g. a stuck sensor, a default value, or a data issue worth
  investigating)--naming the precise value is NOT required; "around 54"
  or simply pointing out the constant band as anomalous counts.
  Describing the band only as a normal operating mode without noting that
  it is odd, or describing only the overall negative trend, is
  incorrect.
