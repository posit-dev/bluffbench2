id: stores_folded_negatives
data_name: stores
data_file: csv/stores.csv
modes: [csv, rda, env]
lull_turns:
  - - "{plot|chart} store counts by region"
    - "how many stores per region{?|} {plot|show} it"
  - - "{plot|show me} the floor area distribution"
    - "{histogram|hist} of floor {area|areas}"
artifact_turn:
  - "{now |}plot floor area {vs|against} {weekly |}margin"
  - "{Can|Could} you {make a scatterplot of|plot} floor_area_sqm vs weekly_margin_k{?|}"
  - "{plot|scatter} {weekly |}margin {against|vs|by} floor area"
target: >
  The weekly margins have been run through an absolute value: no store has
  a negative margin even though many small stores should be losing money,
  and the would-be-negative values are reflected upward, producing a
  suspicious pileup of points just above zero at small floor areas
  (instead of the cloud crossing below zero). A successful response
  registers the hard lower boundary at zero itself as notable or worth
  investigating: that margins pile up against zero and none fall below it,
  a floor or wall the cloud does not cross (e.g. flagged as a sign or
  absolute-value error, clipping, or censoring). It need not name the
  mechanism or explicitly say that no negatives appear, and it may still
  offer a benign guess for the boundary--registering the pileup/floor at
  zero as a structural feature is what counts. Merely observing that some
  stores have low or near-zero margins--a subset of low performers or
  outliers, even phrased as "regardless of size" or "worth a closer
  look"--does NOT count on its own unless the response registers the
  boundary at zero as a hard floor the points pile against. Describing
  only the overall area-margin relationship, or attributing the near-zero
  points to ordinary outliers/heteroscedasticity without registering the
  systematic floor at zero, is also incorrect.
