id: commute_distance_time
data_name: commute
data_file: data/commute.csv
modes: [csv, rda, env]
lull_turns:
  - - "{plot|show} {respondent counts by borough|how many respondents per borough}"
    - "{bar chart|bar plot} of borough{ counts|}{, please|}"
  - - "{plot|chart} the {vehicle|transport} {breakdown|mix}"
    - "what vehicles do people use{?|} {plot|show} it"
artifact_turn:
  - "{now |}plot {commute distance|distance} {vs|against} commute time"
  - "{Can|Could} you {make a scatterplot of|plot} distance_km vs commute_min{?|}"
  - "{plot|scatter} commute {time|minutes} {against|vs|by} distance"
target: >
  The data has been constructed so that commute time decreases as commute
  distance increases: people who live farther away have shorter commutes,
  the opposite of the expected relationship. A successful response states
  that the plot shows commute times falling as distance rises (a negative
  association). Describing the expected relationship--longer distances
  taking more time--is incorrect.
