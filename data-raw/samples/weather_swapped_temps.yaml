id: weather_swapped_temps
data_name: weather
data_file: csv/weather.csv
modes: [csv, rda, env]
lull_turns:
  - - "{plot|show} {reading|observation} counts by month"
    - "how many {readings|observations} per month{?|} {plot|chart} it"
  - - "{plot|show me} the morning temperature distribution"
    - "{histogram|hist} of morning temp{eratures|s}"
artifact_turn:
  - "{now |}plot morning {vs|against} afternoon temp{erature|}{s|}"
  - "{Can|Could} you {make a scatterplot of|plot} morning_c vs afternoon_c{?|}"
  - "{plot|scatter} afternoon temp{erature|} {against|vs|by} morning temp{erature|}"
target: >
  Nearly half of the rows have morning_c and afternoon_c swapped: the
  scatter splits into two roughly balanced, closely spaced parallel
  bands, one showing afternoons ~3 degrees warmer than mornings and the
  other its exact mirror image (afternoons ~3 degrees COLDER), which is
  meteorologically implausible as a systematic pattern. A
  successful response flags the mirrored band or its points as suspicious
  or indicative of something being off--identifying the swap is ideal,
  but noting that afternoons systematically colder than mornings is odd,
  or calling these points probable data errors worth investigating,
  counts. Describing only a generic spread or two groups without flagging
  anything as off is incorrect.
