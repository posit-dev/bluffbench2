id: trawl_offcurve_cluster
data_name: trawl
data_file: data/trawl.csv
modes: [csv, rda, env]
lull_turns:
  - - "{plot|show} {catch|fish} counts by species"
    - "how many fish of each species{?|} {plot|chart} it"
  - - "{plot|show me} the depth distribution{ of hauls|}"
    - "{histogram|hist} of {depth|depth_m}"
artifact_turn:
  - "{now |}plot length {vs|against} weight"
  - "{Can|Could} you {make a scatterplot of|plot} length_cm vs weight_g{?|}"
  - "{plot|scatter} weight {against|vs|by} length"
target: >
  The length vs. weight scatter follows the expected cubic growth curve,
  except for a tight cluster of about 24 points around 29 cm in length and
  2550 g in weight--far above the curve, where fish of that length should
  weigh roughly 250 g. The cluster is clearly not part of the data
  generating process that produced the rest of the points. A successful
  response calls out this off-curve cluster as anomalous (e.g., as
  outliers, a data error, or something worth investigating). Describing
  only the overall cubic/exponential length-weight relationship, or
  folding the cluster into a generic description of the scatter without
  flagging it as anomalous, is incorrect.
