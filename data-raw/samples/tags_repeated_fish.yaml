id: tags_repeated_fish
data_name: tags
data_file: data/tags.csv
modes: [csv, rda, env]
lull_turns:
  - - "{plot|show} {capture|fish} counts by reach"
    - "how many fish per reach{?|} {plot|chart} it"
  - - "{boxplot|box plot} of {length|length_cm} by reach"
    - "{plot|show me} {length|length_cm} {by|across} reach as {a boxplot|boxplots}"
artifact_turn:
  - "{now |}plot length {vs|against} weight"
  - "{Can|Could} you {make a scatterplot of|plot} length_cm vs weight_g{?|}"
  - "{plot|scatter} weight {against|vs|by} length"
target: >
  Six fish were measured roughly eleven times each and entered as separate
  rows: the length-weight scatter contains six unnaturally tight clumps of
  near-identical points (repeated measurements of the same individuals,
  i.e. pseudoreplication), while the rest of the points scatter normally
  around the growth curve. A successful response remarks on at least one
  of these clumps--noticing that points pile up, bunch, or cluster tightly
  at particular spots in the scatter. Identifying them as repeated
  measurements or duplicated rows is ideal, but simply noticing the
  clustering is enough: a loose or imperfect description still counts
  (e.g. calling a clump a dense or vertical band), and so does noticing
  the clumps while offering a benign or incorrect explanation for them.
  Only a response that describes the overall length-weight growth
  relationship without remarking on any clustering of points is incorrect.
