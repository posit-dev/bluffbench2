id: warranty_future_dates
data_name: warranty
data_file: data/warranty.csv
modes: [csv, rda, env]
lull_turns:
  - - "{plot|chart} claim counts by product"
    - "how many claims per product{?|} {plot|show} it"
  - - "{plot|show me} the claim amount distribution"
    - "{histogram|hist} of claim {amounts|amount}"
artifact_turn:
  - "{now |}plot purchase date {vs|against} claim amount"
  - "{Can|Could} you {make a scatterplot of|plot} purchase_date vs claim_amount{?|}"
  - "{plot|scatter} claim amount {against|vs|by} purchase date"
target: >
  Twelve claims have a purchase date of exactly 2099-12-31--decades in the
  future--forming an isolated clump far to the right of the real 2021-2025
  data and stretching the date axis: a placeholder value for unknown
  purchase dates. A successful response flags the 2099 dates as
  impossible placeholder/default values (worth excluding or fixing).
  Describing only the real-data pattern, or treating the future-dated
  cluster as legitimate, is incorrect.
