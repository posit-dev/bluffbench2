id: schools_passrate
data_name: schools
data_file: data/schools.csv
modes: [csv, rda, env]
lull_turns:
  - - "{plot|show} the counts by district"
    - "how many schools per district{?|} {plot|chart} it"
  - - "{plot|chart} the {breakdown|split} by level"
    - "how many schools at each level{?|} {plot|show} it"
artifact_turn:
  - "{now |}plot pass_rate {vs|against} class_size"
  - "{Can|Could} you {make a scatterplot of|plot} pass_rate vs class_size{?|}"
  - "{plot|scatter} pass rate {against|vs|by} class size"
target: >
  Pass rate is computed per class, so each class's rate can only land on a
  fraction with that class's size as its denominator: at small class sizes
  the scatter resolves into discrete horizontal rungs (e.g. steps of 1/6,
  1/7, 1/8 ...), fanning out into a near-continuous band as class size
  grows. This is small-denominator quantization, so the rates are not
  strictly comparable across class sizes. A successful response flags the
  discreteness--the rungs of identical fractions at small class sizes, the
  rates landing only on coarse steps, or that the rates aren't comparable
  / shouldn't be treated as continuous. Describing only the overall trend
  (larger classes pass at higher rates), or merely that small classes are
  "more variable" / a funnel of increasing variance, without remarking on
  the discrete fractions or quantization, is incorrect.
