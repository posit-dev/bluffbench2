id: rentals_crossing_bands
data_name: rentals
data_file: csv/rentals.csv
modes: [csv, rda, env]
lull_turns:
  - - "{plot|chart} listing counts by bedrooms"
    - "how many listings {for each bedroom count|per bedroom count}{?|} {plot|show} it"
  - - "{plot|show me} the rent distribution"
    - "{histogram|hist} of {rent|rent_usd}"
artifact_turn:
  - "{now |}plot distance {from center |}{vs|against} rent"
  - "{Can|Could} you {make a scatterplot of|plot} distance_km vs rent_usd{?|}"
  - "{plot|scatter} rent {against|vs|by} distance{ from center|}"
target: >
  The distance-rent scatter is not one cloud but two distinct linear bands
  that cross: most listings get cheaper with distance from the center, but
  a small subpopulation (roughly one listing in seven) gets more expensive
  with distance, forming a faint X pattern. A successful response identifies the two distinct crossing
  bands/subgroups with opposite slopes (and ideally suggests a lurking
  segment). Describing the plot as a single weak or noisy relationship,
  without identifying the two crossing bands, is incorrect. Noticing only a
  cluster of high-rent listings far from the center (or a few far-out "outliers"
  that buck the trend) does NOT count on its own: that is just one arm of the X.
  The response must convey the crossing itself--that this subgroup runs the
  opposite way, cheap near the center and pricier farther out, an
  opposite-sloped band--not merely an isolated corner cluster.
