id: labs_imputed_cholesterol
data_name: labs
data_file: data/labs.csv
modes: [csv, rda, env]
lull_turns:
  - - "{plot|chart} {specimen counts by fasting status|the fasting/non-fasting split}"
    - "how many {specimens|samples} were fasting{?|} {plot|show} it"
  - - "{plot|show me} the BMI distribution"
    - "{histogram|hist} of bmi{, please|}"
artifact_turn:
  - "{now |}plot BMI {vs|against} cholesterol"
  - "{Can|Could} you {make a scatterplot of|plot} bmi vs cholesterol{?|}"
  - "{plot|scatter} cholesterol {against|vs|by} BMI"
target: >
  About a quarter of the cholesterol values fall EXACTLY on a straight
  line (cholesterol = 120 + 2.6 * bmi) with zero residual, as if missing
  values had been filled in from a fitted regression: within the noisy
  cloud there is a perfectly straight run of points along the trend. A
  successful response flags this suspiciously exact line of points (e.g.
  as likely imputed, model-generated, or synthetic values worth
  investigating). Describing only the overall BMI-cholesterol trend
  without flagging the zero-noise line is incorrect.
