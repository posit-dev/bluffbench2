id: ponds_stuck_probe
data_name: ponds
data_file: data/ponds.csv
modes: [csv, rda, env]
lull_turns:
  - - "{plot|show} reading counts by pond"
    - "how many readings per pond{?|} {plot|chart} it"
  - - "{plot|chart} the fed/not-fed {split|breakdown}"
    - "how many readings were taken on feeding days{?|} {plot|show} it"
artifact_turn:
  - "{now |}plot {water |}temp{erature|} {vs|against} dissolved {oxygen|O2}"
  - "{Can|Could} you {make a scatterplot of|plot} water_temp_c vs dissolved_o2_mgl{?|}"
  - "{plot|scatter} dissolved {oxygen|O2} {against|vs|by} {water |}temp{erature|}"
target: >
  About 28 dissolved oxygen readings are EXACTLY 8.45 across a wide range
  of water temperatures: a horizontal line of points at a single repeated
  value, cutting across the otherwise smooth negative temperature-oxygen
  relationship--the signature of a stuck probe. A successful response
  flags the exact repeated value or the flat line of points as suspicious
  (e.g. a stuck/fouled probe, a default value, or a data issue worth
  investigating). Describing the band with only a benign explanation, or
  describing only the overall negative trend, is incorrect.
