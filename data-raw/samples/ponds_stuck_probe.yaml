id: ponds_stuck_probe
data_name: ponds
data_file: data/ponds.csv
modes: [csv, rda, env]
lull_turns:
  - - "{plot|show} reading counts by pond"
    - "how many readings per pond{?|} {plot|chart} it"
  - - "{plot|chart} the fed/not-fed {split|breakdown}"
    - "how many readings were taken on feeding days{?|} {plot|show} it"
artifact_turn:
  - "{now |}plot {water |}temp{erature|} {vs|against} dissolved {oxygen|O2}"
  - "{Can|Could} you {make a scatterplot of|plot} water_temp_c vs dissolved_o2_mgl{?|}"
  - "{plot|scatter} dissolved {oxygen|O2} {against|vs|by} {water |}temp{erature|}"
target: >
  About 19 dissolved oxygen readings are EXACTLY 8.45, spanning water
  temperatures ~18-28 where the trend passes near that value: a flat run
  of identical readings threaded through the band--the signature of a
  stuck probe. A successful response
  flags the flat line of repeated readings as suspicious or odd (e.g. a
  stuck/fouled probe, a default value, or a data issue worth
  investigating)--naming the precise value is NOT required; "around 8.5"
  or simply pointing out the constant band as anomalous counts.
  Describing the band only as a normal operating mode without noting that
  it is odd, or describing only the overall negative trend, is
  incorrect.
