id: memberships_epoch_dates
data_name: memberships
data_file: data/memberships.csv
modes: [csv, rda, env]
lull_turns:
  - - "{plot|chart} member counts by tier"
    - "how many members per tier{?|} {plot|show} it"
  - - "{plot|show me} the {visits|visits_per_month} distribution"
    - "{histogram|hist} of {monthly visits|visits_per_month}"
artifact_turn:
  - "{now |}plot join date {vs|against} {monthly visits|visits per month}"
  - "{Can|Could} you {make a scatterplot of|plot} join_date vs visits_per_month{?|}"
  - "{plot|scatter} {monthly visits|visits} {against|vs|by} join date"
target: >
  Thirteen members have a join date of exactly 1970-01-01--the Unix
  epoch--decades before the gym existed, forming an isolated clump far to
  the left of the real 2022-2026 data and stretching the date axis. A
  successful response flags the 1970 dates as placeholder/default values
  (missing dates coded as timestamp zero, worth excluding or fixing).
  Describing only the recent-data pattern, or treating the 1970 cluster as
  real long-tenured members, is incorrect.
